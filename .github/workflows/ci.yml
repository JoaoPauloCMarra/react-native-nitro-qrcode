name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify library and example
        run: bun run check
