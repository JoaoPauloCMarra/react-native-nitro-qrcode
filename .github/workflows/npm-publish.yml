name: Publish npm package

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Setup LLVM
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify release tag matches package version
        run: |
          PACKAGE_VERSION="$(node -p "require('./packages/react-native-nitro-qrcode/package.json').version")"
          RELEASE_TAG="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Verify package
        run: bun run check

      - name: Check package contents
        working-directory: packages/react-native-nitro-qrcode
        run: npm pack --dry-run

      - name: Publish package
        working-directory: packages/react-native-nitro-qrcode
        run: npm publish --access public
